# Template: ethnicity (Hispanic origin, binary)
#
# Hispanic vs. non-Hispanic from _HISPANC. CDC's _HISPANC is stable
# across all BRFSS years 2012-2024 with consistent coding:
# 1=Hispanic, 2=Non-Hispanic, 9=DK/Refused.
#
# STATE USERS: state codebooks may use different column names. Add
# by_year overrides for your codebook's per-year column names.

output_column: ethnicity
type: categorical_map

description: |
  Binary Hispanic ethnicity. Hispanic vs. non-Hispanic.

inputs:
  hisp: _HISPANC

# Example state-codebook overrides (uncomment and adapt):
# by_year:
#   "2017-2021":
#     inputs:
#       hisp: HISPANC3
#   "2022-2024":
#     inputs:
#       hisp: HISPANC3_01

levels:
  - value: 1
    label: "Hispanic"
    when: hisp == 1
  - value: 2
    label: "Non-Hispanic"
    when: hisp == 2
  - value: 9
    label: "Refused / Don't know"
    when: TRUE
