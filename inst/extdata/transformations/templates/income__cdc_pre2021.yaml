# Template: income (CDC INCOME2 / INCOME3 codes, pre-2021)
#
# Pre-2021 INCOME2 / INCOME3 brackets: <$10K, $10-15K, $15-20K, $20-25K,
# $25-35K, $35-50K, $50-75K, $75K+.
#
# CDC restructured income brackets in 2021 (added $200K+ topcoding).
# Use income__cdc_2021plus for years 2021+, or apply by_year overrides.

output_column: income
type: categorical_map

description: |
  Pre-2021 CDC income brackets (INCOME2 / INCOME3). 8 categories from
  <$10K to $75K+.

inputs:
  inc: INCOME2

levels:
  - value: 1
    label: "Less than $10,000"
    when: inc == 1
  - value: 2
    label: "$10,000 - $14,999"
    when: inc == 2
  - value: 3
    label: "$15,000 - $19,999"
    when: inc == 3
  - value: 4
    label: "$20,000 - $24,999"
    when: inc == 4
  - value: 5
    label: "$25,000 - $34,999"
    when: inc == 5
  - value: 6
    label: "$35,000 - $49,999"
    when: inc == 6
  - value: 7
    label: "$50,000 - $74,999"
    when: inc == 7
  - value: 8
    label: "$75,000 or more"
    when: inc == 8
  - value: 9
    label: "Refused / Don't know"
    when: TRUE
