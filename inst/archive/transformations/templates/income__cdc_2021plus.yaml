# Template: income (CDC 2021+ INCOME3 codes)
#
# Post-2021 INCOME3 brackets: same low end as pre-2021 plus three new
# upper brackets: $75-100K, $100-150K, $150-200K, $200K+.

output_column: income
type: categorical_map

description: |
  Post-2021 CDC income brackets (INCOME3). 11 categories from <$10K
  to $200K+.

inputs:
  inc: INCOME3

levels:
  - value: 1
    label: "Less than $10,000"
    when: inc == 1
  - value: 2
    label: "$10,000 - $14,999"
    when: inc == 2
  - value: 3
    label: "$15,000 - $19,999"
    when: inc == 3
  - value: 4
    label: "$20,000 - $24,999"
    when: inc == 4
  - value: 5
    label: "$25,000 - $34,999"
    when: inc == 5
  - value: 6
    label: "$35,000 - $49,999"
    when: inc == 6
  - value: 7
    label: "$50,000 - $74,999"
    when: inc == 7
  - value: 8
    label: "$75,000 - $99,999"
    when: inc == 8
  - value: 9
    label: "$100,000 - $149,999"
    when: inc == 9
  - value: 10
    label: "$150,000 - $199,999"
    when: inc == 10
  - value: 11
    label: "$200,000 or more"
    when: inc == 11
  - value: 99
    label: "Refused / Don't know"
    when: TRUE
