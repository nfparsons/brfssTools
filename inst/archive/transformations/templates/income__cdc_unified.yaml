# Template: income (CDC unified, year-aware brackets)
#
# Handles both pre-2021 (INCOME2, 8 brackets) and 2021+ (INCOME3, 11
# brackets) automatically. Output values are normalized to a unified
# 11-bracket scheme; pre-2021 data has the upper brackets collapsed
# (codes 8+ all become "75K+").
#
# This template is the recommended choice for cross-year analyses spanning
# the 2020/2021 boundary.

output_column: income
type: categorical_map

description: |
  Unified CDC income. Handles INCOME2 (pre-2021, 8 brackets) and INCOME3
  (2021+, 11 brackets) with normalized output values.

inputs:
  inc: INCOME3

# Pre-2021: 8-bracket INCOME2 codes
by_year:
  "2012-2020":
    inputs:
      inc: INCOME2
    levels:
      - value: 1
        label: "Less than $10,000"
        when: inc == 1
      - value: 2
        label: "$10,000 - $14,999"
        when: inc == 2
      - value: 3
        label: "$15,000 - $19,999"
        when: inc == 3
      - value: 4
        label: "$20,000 - $24,999"
        when: inc == 4
      - value: 5
        label: "$25,000 - $34,999"
        when: inc == 5
      - value: 6
        label: "$35,000 - $49,999"
        when: inc == 6
      - value: 7
        label: "$50,000 - $74,999"
        when: inc == 7
      - value: 8
        label: "$75,000 or more (collapsed)"
        when: inc == 8
      - value: 99
        label: "Refused / Don't know"
        when: TRUE

# Default (2021+) 11-bracket INCOME3 codes
levels:
  - value: 1
    label: "Less than $10,000"
    when: inc == 1
  - value: 2
    label: "$10,000 - $14,999"
    when: inc == 2
  - value: 3
    label: "$15,000 - $19,999"
    when: inc == 3
  - value: 4
    label: "$20,000 - $24,999"
    when: inc == 4
  - value: 5
    label: "$25,000 - $34,999"
    when: inc == 5
  - value: 6
    label: "$35,000 - $49,999"
    when: inc == 6
  - value: 7
    label: "$50,000 - $74,999"
    when: inc == 7
  - value: 8
    label: "$75,000 - $99,999"
    when: inc == 8
  - value: 9
    label: "$100,000 - $149,999"
    when: inc == 9
  - value: 10
    label: "$150,000 - $199,999"
    when: inc == 10
  - value: 11
    label: "$200,000 or more"
    when: inc == 11
  - value: 99
    label: "Refused / Don't know"
    when: TRUE
